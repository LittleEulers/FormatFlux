<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormatFlux | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <section class="auth-card">
    <h1>Sign in to FormatFLux</h1>
    <p class="status">Access your converter dashboard.</p>
    <form id="loginForm" class="options-row" autocomplete="on">
      <label for="email">Email</label>
      <input id="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" required />
      <button type="submit">Sign in</button>
    </form>
    <p id="loginStatus" class="status"></p>
    <p class="status">No account? <a href="register.html">Sign up</a></p>
  </section>
  <script src="auth.js"></script>
  <script>
    if (FormatFluxAuth.getSession()) window.location.href = 'index.html';
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const users = FormatFluxAuth.getUsers();
      const match = users.find((u) => u.email === email && u.password === password);
      const status = document.getElementById('loginStatus');
      if (!match) return (status.textContent = 'Invalid email or password.');
      FormatFluxAuth.setSession(email);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
